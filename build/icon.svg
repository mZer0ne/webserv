<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#sheen)"/>

  <!-- W mark -->
  <polyline points="300,330 396,720 512,500 628,720 724,330"
            fill="none" stroke="#ffffff" stroke-width="74"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- network nodes at the valleys -->
  <circle cx="396" cy="720" r="30" fill="#ffffff"/>
  <circle cx="628" cy="720" r="30" fill="#ffffff"/>

  <!-- running status dot -->
  <circle cx="724" cy="724" r="46" fill="#10b981" stroke="#ffffff" stroke-width="16"/>
</svg>
